# {{ ansible_managed }}
# Ansilume production docker-compose — do not edit manually.
services:
  app:
{% if ansilume_use_prebuilt_images %}
    image: {{ ansilume_app_image }}:{{ ansilume_version }}
{% else %}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-{{ ansilume_uid }}}
        GROUP_ID: ${GID:-{{ ansilume_gid }}}
{% endif %}
    container_name: {{ ansilume_compose_project }}_app
    restart: {{ ansilume_restart_policy }}
    working_dir: /var/www
{% if not ansilume_use_prebuilt_images %}
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
{% endif %}
    environment:
      - APP_ENV=${APP_ENV:-{{ ansilume_app_env }}}
    env_file:
      - .env
    depends_on:
{% if ansilume_db_local %}
      db:
        condition: service_healthy
{% endif %}
{% if ansilume_redis_local %}
      redis:
        condition: service_healthy
{% endif %}
    healthcheck:
      test: ["CMD", "php", "/var/www/yii", "health/check"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - {{ ansilume_network_name }}

  nginx:
{% if ansilume_use_prebuilt_images %}
    image: {{ ansilume_nginx_prebuilt_image }}:{{ ansilume_version }}
{% else %}
    image: {{ ansilume_nginx_image }}
{% endif %}
    container_name: {{ ansilume_compose_project }}_nginx
    restart: {{ ansilume_restart_policy }}
    ports:
      - "${NGINX_PORT:-{{ ansilume_nginx_port }}}:80"
{% if not ansilume_use_prebuilt_images %}
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
{% endif %}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qSO /dev/null http://127.0.0.1/health 2>&1 | grep -q 'HTTP/'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - {{ ansilume_network_name }}

{% if ansilume_db_local %}
  db:
    image: {{ ansilume_db_image }}
    container_name: {{ ansilume_compose_project }}_db
    restart: {{ ansilume_restart_policy }}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-{{ ansilume_db_root_password }}}
      MYSQL_DATABASE: ${DB_NAME:-{{ ansilume_db_name }}}
      MYSQL_USER: ${DB_USER:-{{ ansilume_db_user }}}
      MYSQL_PASSWORD: ${DB_PASSWORD:-{{ ansilume_db_password }}}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USER:-{{ ansilume_db_user }}}", "-p${DB_PASSWORD:-{{ ansilume_db_password }}}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - {{ ansilume_network_name }}
{% endif %}

{% if ansilume_redis_local %}
  redis:
    image: {{ ansilume_redis_image }}
    container_name: {{ ansilume_compose_project }}_redis
    restart: {{ ansilume_restart_policy }}
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - {{ ansilume_network_name }}
{% endif %}

  schedule-runner:
{% if ansilume_use_prebuilt_images %}
    image: {{ ansilume_app_image }}:{{ ansilume_version }}
{% else %}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-{{ ansilume_uid }}}
        GROUP_ID: ${GID:-{{ ansilume_gid }}}
{% endif %}
    container_name: {{ ansilume_compose_project }}_schedule_runner
    restart: {{ ansilume_restart_policy }}
    working_dir: /var/www
    command: ["/bin/sh", "-c",
      "while true; do php yii schedule/run && touch /tmp/schedule-alive; sleep 60; done"]
{% if not ansilume_use_prebuilt_images %}
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
{% endif %}
    env_file:
      - .env
    depends_on:
{% if ansilume_db_local %}
      db:
        condition: service_healthy
{% endif %}
{% if ansilume_redis_local %}
      redis:
        condition: service_healthy
{% endif %}
    healthcheck:
      test: ["CMD", "sh", "-c",
        "test -f /tmp/schedule-alive && test $(( $(date +%s) - $(stat -c %Y /tmp/schedule-alive) )) -lt 150"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 90s
    networks:
      - {{ ansilume_network_name }}

  queue-worker:
{% if ansilume_use_prebuilt_images %}
    image: {{ ansilume_app_image }}:{{ ansilume_version }}
{% else %}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-{{ ansilume_uid }}}
        GROUP_ID: ${GID:-{{ ansilume_gid }}}
{% endif %}
    container_name: {{ ansilume_compose_project }}_queue_worker
    restart: {{ ansilume_restart_policy }}
    working_dir: /var/www
    command: ["php", "yii", "worker/start"]
{% if not ansilume_use_prebuilt_images %}
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
{% endif %}
    env_file:
      - .env
    depends_on:
{% if ansilume_db_local %}
      db:
        condition: service_healthy
{% endif %}
{% if ansilume_redis_local %}
      redis:
        condition: service_healthy
{% endif %}
    healthcheck:
      test: ["CMD", "php", "/var/www/yii", "health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - {{ ansilume_network_name }}

{% for i in range(1, ansilume_runner_count + 1) %}
  runner-{{ i }}:
{% if ansilume_use_prebuilt_images %}
    image: {{ ansilume_runner_image }}:{{ ansilume_version }}
{% else %}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-{{ ansilume_uid }}}
        GROUP_ID: ${GID:-{{ ansilume_gid }}}
{% endif %}
    container_name: {{ ansilume_compose_project }}_runner_{{ i }}
    restart: {{ ansilume_restart_policy }}
    working_dir: /var/www
    command: ["php", "yii", "runner/start"]
{% if not ansilume_use_prebuilt_images %}
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
{% endif %}
    environment:
      - RUNNER_NAME=runner-{{ i }}
      - RUNNER_BOOTSTRAP_SECRET=${RUNNER_BOOTSTRAP_SECRET}
      - API_URL=http://nginx
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /var/www/runtime/runner-runner-{{ i }}.token"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - {{ ansilume_network_name }}

{% endfor %}
networks:
  {{ ansilume_network_name }}:
    driver: bridge

{% if ansilume_db_local %}
volumes:
  db_data:
{% endif %}
