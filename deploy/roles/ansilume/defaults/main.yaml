---
# ============================================================================
# Ansilume — Production Deployment Defaults
#
# Override any of these variables in your inventory, group_vars, or playbook.
# Secrets (passwords, keys) MUST be overridden — defaults are insecure.
# ============================================================================

# -- Deployment paths --------------------------------------------------------

# Base directory on the target host where ansilume will be installed.
ansilume_install_dir: /opt/ansilume

# Git repository URL to clone. Set to "" to skip cloning (e.g. when deploying
# a pre-built release tarball via ansilume_release_archive).
ansilume_repo_url: "https://github.com/ansilume/ansilume.git"

# Git branch or tag to deploy.
ansilume_version: main

# Path to a local release tarball (.tar.gz) to upload instead of git clone.
# When set, ansilume_repo_url is ignored.
ansilume_release_archive: ""

# -- Application environment -------------------------------------------------

ansilume_app_env: prod
ansilume_yii_env: prod
ansilume_yii_debug: false

# -- Secrets (MUST override in production) -----------------------------------

# Yii2 cookie signing key. Minimum 32 characters.
# Generate with: openssl rand -hex 32
ansilume_cookie_validation_key: "CHANGE-ME-INSECURE-DEFAULT"

# AES-256-CBC key for encrypting credentials at rest. Minimum 32 characters.
# Generate with: openssl rand -hex 32
# WARNING: Changing after deployment makes all stored credentials unreadable.
ansilume_app_secret_key: "CHANGE-ME-INSECURE-DEFAULT"

# Shared secret for runner self-registration. Set to "" to disable.
# Generate with: openssl rand -hex 24
ansilume_runner_bootstrap_secret: ""

# -- Database ----------------------------------------------------------------

# Set to true to deploy a local MariaDB container alongside the app.
# Set to false when using an existing external database.
ansilume_db_local: true

# Database connection settings. When ansilume_db_local is true, these
# configure the local MariaDB container. When false, they point to the
# external database.
ansilume_db_host: db
ansilume_db_port: 3306
ansilume_db_name: ansilume
ansilume_db_user: ansilume
ansilume_db_password: "CHANGE-ME-INSECURE-DEFAULT"

# Root password for the local MariaDB container. Ignored when
# ansilume_db_local is false.
ansilume_db_root_password: "CHANGE-ME-INSECURE-DEFAULT"

# MariaDB image and version for the local database container.
ansilume_db_image: "mariadb:10.11"

# MariaDB configuration overrides.
ansilume_db_charset: utf8mb4
ansilume_db_collation: utf8mb4_unicode_ci
ansilume_db_max_connections: 200

# -- Redis -------------------------------------------------------------------

# Set to true to deploy a local Redis container.
# Set to false when using an existing external Redis.
ansilume_redis_local: true

ansilume_redis_host: redis
ansilume_redis_port: 6379
ansilume_redis_db: 0

# Redis image and version for the local container.
ansilume_redis_image: "redis:7.2-alpine"

# -- Nginx -------------------------------------------------------------------

# Port the nginx container exposes on the host.
ansilume_nginx_port: 8080

# Nginx image and version.
ansilume_nginx_image: "nginx:1.25-alpine"

# Server name for the nginx vhost. Use "_" for any.
ansilume_nginx_server_name: "_"

# Maximum upload size (playbooks, inventories, etc.).
ansilume_nginx_client_max_body_size: 40M

# FastCGI read timeout in seconds.
ansilume_nginx_fastcgi_timeout: 120

# -- PHP / App container -----------------------------------------------------

# Base PHP-FPM image to build from.
ansilume_php_image: "php:8.2-fpm"

# PHP configuration.
ansilume_php_upload_max_filesize: 40M
ansilume_php_post_max_size: 40M
ansilume_php_max_execution_time: 120
ansilume_php_memory_limit: 256M
ansilume_php_timezone: UTC

# UID/GID for the www-data user inside the container.
ansilume_uid: 1000
ansilume_gid: 1000

# -- Runners -----------------------------------------------------------------

# Number of runner containers to deploy.
ansilume_runner_count: 2

# Runner execution mode: "local" (direct) or "docker" (isolated container).
ansilume_runner_mode: local

# Docker image for isolated ansible execution (only when runner_mode=docker).
ansilume_runner_docker_image: "cytopia/ansible:latest"

# -- Job execution -----------------------------------------------------------

# Directory for job working space inside the container.
ansilume_job_workspace_path: /tmp/ansilume/jobs

# Directory for job log storage inside the container.
ansilume_job_log_path: /var/www/runtime/job-logs

# -- Artifacts ---------------------------------------------------------------

# Directory for artifact storage inside the container.
ansilume_artifact_storage_path: /var/www/runtime/artifacts

# Maximum single artifact file size in bytes (default 10 MB).
ansilume_artifact_max_file_size: 10485760

# -- Mail / SMTP -------------------------------------------------------------

# SMTP settings for outgoing notifications.
# Leave ansilume_smtp_host empty to use file-based mail transport (no sending).
ansilume_smtp_host: ""
ansilume_smtp_port: 587
ansilume_smtp_encryption: tls
ansilume_smtp_user: ""
ansilume_smtp_password: ""
ansilume_admin_email: "admin@example.com"
ansilume_sender_email: "noreply@ansilume.local"

# -- Audit / SIEM ------------------------------------------------------------

# Forward audit log events to syslog (works with Promtail/Loki, Splunk syslog
# input, rsyslog forwarding). Database logging is always active.
ansilume_audit_syslog_enabled: false
ansilume_audit_syslog_ident: ansilume
ansilume_audit_syslog_facility: LOG_LOCAL0

# -- Docker Compose ----------------------------------------------------------

# Docker Compose project name.
ansilume_compose_project: ansilume

# Restart policy for all containers.
ansilume_restart_policy: unless-stopped

# Docker network name.
ansilume_network_name: ansilume

# -- System requirements -----------------------------------------------------

# Create a dedicated system user and group for ansilume. Set to false in
# corporate environments where the user is managed externally (e.g. LDAP,
# FreeIPA, or provisioned by a separate role).
ansilume_create_user: false

# System user and group that will own the deployment directory and run
# containers. Must exist on the target when ansilume_create_user is false.
ansilume_system_user: ansilume
ansilume_system_group: ansilume
