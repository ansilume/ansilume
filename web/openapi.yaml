openapi: 3.1.0
info:
  title: Ansilume REST API
  version: "1.9.0"
  description: |
    REST API v1 for the Ansilume automation platform.

    Every feature of Ansilume is reachable via this API — the web UI is one
    client among many. When a feature changes, this document **must** be
    updated in the same commit (see `CLAUDE.md`).

    ## Authentication

    All endpoints under `/api/v1/` require a Bearer token except where noted.
    Create a token via the browser (*Profile → API Tokens*) or from the console:

    ```bash
    docker compose exec app php yii api-token/create admin "my-token" --raw
    ```

    Pass it as:

    ```
    Authorization: Bearer <token>
    ```

    ## Errors

    Error responses have the shape `{ "error": { "message": "..." } }` and
    use conventional HTTP status codes (401, 403, 404, 422).

servers:
  - url: http://localhost:8080
    description: Local dev (via nginx)
  - url: https://ansilume.example.com
    description: Production (replace with your deployment)

security:
  - bearerAuth: []

tags:
  - name: Projects
  - name: Inventories
  - name: Credentials
  - name: Job Templates
  - name: Jobs
  - name: Schedules
  - name: Notification Templates
  - name: Approval Rules
  - name: Approvals
  - name: Workflow Templates
  - name: Workflow Jobs
  - name: Analytics
  - name: Triggers
  - name: Roles

# Shared query parameter list used by every analytics endpoint.
# Defined once via a YAML anchor and referenced with `*` so we don't
# repeat eight parameters ten times.
x-analytics-filters: &analyticsFilters
  - { in: query, name: date_from, required: false, schema: { type: string, format: date }, description: Inclusive start date (YYYY-MM-DD) }
  - { in: query, name: date_to, required: false, schema: { type: string, format: date }, description: Inclusive end date (YYYY-MM-DD) }
  - { in: query, name: project_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: template_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: user_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: runner_group_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: granularity, required: false, schema: { type: string, enum: [daily, weekly], default: daily } }
  - { in: query, name: format, required: false, schema: { type: string, enum: [json, csv], default: json } }

paths:
  # ─────────────────────────────── Projects ───────────────────────────────
  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectList' }
  /api/v1/projects/{id}:
    get:
      tags: [Projects]
      summary: Get a single project
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200': { $ref: '#/components/responses/ProjectResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ───────────────────────────── Inventories ─────────────────────────────
  /api/v1/inventories:
    get:
      tags: [Inventories]
      summary: List inventories
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryList' }
    post:
      tags: [Inventories]
      summary: Create an inventory
      description: Requires `inventory.create` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryInput' }
            examples:
              static:
                summary: Static YAML inventory
                value:
                  name: zabbix-hq
                  inventory_type: static
                  content: "---\nall:\n  hosts:\n    zabbix-hq:\n      ansible_host: 10.1.42.108\n"
      responses:
        '201': { $ref: '#/components/responses/InventoryResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/inventories/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Inventories]
      summary: Get a single inventory
      responses:
        '200': { $ref: '#/components/responses/InventoryResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Inventories]
      summary: Update an inventory
      description: Requires `inventory.update`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryInput' }
      responses:
        '200': { $ref: '#/components/responses/InventoryResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Inventories]
      summary: Delete an inventory
      description: Requires `inventory.delete`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ───────────────────────────── Credentials ─────────────────────────────
  /api/v1/credentials:
    get:
      tags: [Credentials]
      summary: List credentials
      description: Secret material is never returned, not even redacted placeholders.
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CredentialList' }
    post:
      tags: [Credentials]
      summary: Create a credential
      description: |
        Requires `credential.create`. For `ssh_key` type, provide the raw PEM
        private key in `secrets.private_key`; public key and algorithm are
        derived server-side via `ssh-keygen -y`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CredentialInput' }
            examples:
              ssh:
                summary: SSH key credential
                value:
                  name: ssh
                  credential_type: ssh_key
                  username: root
                  secrets:
                    private_key: "-----BEGIN OPENSSH PRIVATE KEY-----\n...\n-----END OPENSSH PRIVATE KEY-----\n"
              password:
                summary: Username/password credential
                value:
                  name: db-root
                  credential_type: username_password
                  username: root
                  secrets:
                    password: hunter2
      responses:
        '201': { $ref: '#/components/responses/CredentialResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/credentials/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Credentials]
      summary: Get a single credential
      responses:
        '200': { $ref: '#/components/responses/CredentialResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Credentials]
      summary: Update a credential
      description: |
        Requires `credential.update`. If `secrets` is omitted or empty the
        existing encrypted secret blob is kept unchanged; only metadata is
        updated.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CredentialInput' }
      responses:
        '200': { $ref: '#/components/responses/CredentialResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Credentials]
      summary: Delete a credential
      description: Requires `credential.delete`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Job Templates ───────────────────────────
  /api/v1/job-templates:
    get:
      tags: [Job Templates]
      summary: List job templates
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/JobTemplateList' } } }
  /api/v1/job-templates/{id}:
    get:
      tags: [Job Templates]
      summary: Get a single job template
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/JobTemplateResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────── Jobs ──────────────────────────────
  /api/v1/jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/JobList' } } }
    post:
      tags: [Jobs]
      summary: Launch a job from a template
      description: Requires `job.launch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_template_id]
              properties:
                job_template_id: { type: integer }
                extra_vars:      { type: object, additionalProperties: true }
                limit:           { type: string }
                tags:            { type: string }
      responses:
        '201': { $ref: '#/components/responses/JobResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a single job
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/JobResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/jobs/{id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a running job
      description: Requires `job.cancel`.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/JobResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Schedules ───────────────────────────
  /api/v1/schedules:
    get:
      tags: [Schedules]
      summary: List schedules
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/ScheduleList' } } }
  /api/v1/schedules/{id}:
    get:
      tags: [Schedules]
      summary: Get a single schedule
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/ScheduleResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/schedules/{id}/toggle:
    post:
      tags: [Schedules]
      summary: Toggle a schedule between enabled and disabled
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/ScheduleResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────── Notification Templates ───────────────────────
  /api/v1/notification-templates:
    get:
      tags: [Notification Templates]
      summary: List notification templates
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/NotificationTemplateList' } } }
    post:
      tags: [Notification Templates]
      summary: Create a notification template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationTemplateInput' }
      responses:
        '201': { $ref: '#/components/responses/NotificationTemplateResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/notification-templates/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Notification Templates]
      summary: Get a single notification template
      responses:
        '200': { $ref: '#/components/responses/NotificationTemplateResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Notification Templates]
      summary: Update a notification template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationTemplateInput' }
      responses:
        '200': { $ref: '#/components/responses/NotificationTemplateResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Notification Templates]
      summary: Delete a notification template
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/notification-templates/{id}/test:
    post:
      tags: [Notification Templates]
      summary: Send a test notification through this template
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200':
          description: Test dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sent: { type: boolean }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Approval Rules ───────────────────────────
  /api/v1/approval-rules:
    get:
      tags: [Approval Rules]
      summary: List approval rules
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/GenericList' } } }
    post:
      tags: [Approval Rules]
      summary: Create an approval rule
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        '201': { $ref: '#/components/responses/GenericResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/approval-rules/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Approval Rules]
      summary: Get an approval rule
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Approval Rules]
      summary: Update an approval rule
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Approval Rules]
      summary: Delete an approval rule
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────── Approvals ──────────────────────────────
  /api/v1/approvals:
    get:
      tags: [Approvals]
      summary: List pending approvals
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/GenericList' } } }
  /api/v1/approvals/{id}:
    get:
      tags: [Approvals]
      summary: Get an approval request
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/approvals/{id}/approve:
    post:
      tags: [Approvals]
      summary: Approve a pending request
      description: Requires `approval.decide`.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/approvals/{id}/reject:
    post:
      tags: [Approvals]
      summary: Reject a pending request
      description: Requires `approval.decide`.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────── Workflow Templates ───────────────────────
  /api/v1/workflow-templates:
    get:
      tags: [Workflow Templates]
      summary: List workflow templates
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/GenericList' } } }
    post:
      tags: [Workflow Templates]
      summary: Create a workflow template
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        '201': { $ref: '#/components/responses/GenericResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/workflow-templates/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Workflow Templates]
      summary: Get a workflow template
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Workflow Templates]
      summary: Update a workflow template
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Workflow Templates]
      summary: Delete a workflow template
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/workflow-templates/{id}/launch:
    post:
      tags: [Workflow Templates]
      summary: Launch a workflow from this template
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '201': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────── Workflow Jobs ──────────────────────────
  /api/v1/workflow-jobs:
    get:
      tags: [Workflow Jobs]
      summary: List workflow job executions
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/GenericList' } } }
  /api/v1/workflow-jobs/{id}:
    get:
      tags: [Workflow Jobs]
      summary: Get a single workflow job execution
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/workflow-jobs/{id}/cancel:
    post:
      tags: [Workflow Jobs]
      summary: Cancel a running workflow job
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/workflow-jobs/{id}/resume:
    post:
      tags: [Workflow Jobs]
      summary: Resume a paused workflow step
      description: >
        Advances the workflow past the currently paused step. The pause step
        is marked as succeeded and the engine proceeds to the next step.
        Returns 422 if the workflow is already finished or has no paused step.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/GenericResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ─────────────────────────── Analytics ─────────────────────────
  /api/v1/analytics/summary:
    get:
      tags: [Analytics]
      summary: Job execution summary (totals, success rate, MTTR)
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/template-reliability:
    get:
      tags: [Analytics]
      summary: Per-template reliability (success rate, avg duration)
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/project-activity:
    get:
      tags: [Analytics]
      summary: Per-project job activity
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/user-activity:
    get:
      tags: [Analytics]
      summary: Per-user launch counts and success rate
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/host-health:
    get:
      tags: [Analytics]
      summary: Aggregated ok/changed/failed/unreachable per host
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/job-trend:
    get:
      tags: [Analytics]
      summary: Daily or weekly job counts by status
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/workflow-summary:
    get:
      tags: [Analytics]
      summary: Workflow execution summary (totals, success rate, avg duration)
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/workflow-activity:
    get:
      tags: [Analytics]
      summary: Per-workflow-template reliability
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/approval-summary:
    get:
      tags: [Analytics]
      summary: Approval request outcomes and avg decision time
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/runner-activity:
    get:
      tags: [Analytics]
      summary: Per-runner job counts, success rate, and last-seen
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }

  # ─────────────────────────── Triggers ───────────────────────────
  /trigger/{token}:
    post:
      tags: [Triggers]
      summary: Public webhook endpoint to launch a job by trigger token
      description: |
        Authentication is the token itself (path parameter). This endpoint is
        **not** under `/api/v1/` and does not use the Bearer scheme.
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Job launched
          content: { application/json: { schema: { type: object } } }
        '404':
          description: Unknown token

  # ────────────────────────────── Roles ──────────────────────────────
  /api/v1/roles:
    get:
      tags: [Roles]
      summary: List all RBAC roles (system + custom)
      responses:
        '200':
          description: List of roles with summary counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RoleSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Roles]
      summary: Create a custom role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleInput' }
            example:
              name: reader-plus
              description: Read-only access with analytics
              permissions: [project.view, job.view, analytics.view]
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/roles/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string, pattern: '^[a-z][a-z0-9_-]*$' }
    get:
      tags: [Roles]
      summary: Get a role with direct + effective permissions
      responses:
        '200':
          description: Role detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Roles]
      summary: Update a role's description and direct permissions
      description: |
        System roles (viewer/operator/admin) can have their permissions edited
        but not their name. The name field in the body is ignored for them.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleInput' }
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Roles]
      summary: Delete a custom role
      description: |
        System roles cannot be deleted — returns 422. Users holding the role
        are left with no role and must be reassigned manually.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/permissions:
    get:
      tags: [Roles]
      summary: List all known permissions grouped by domain
      description: |
        Returns the full permission catalog used by the role management UI.
        Useful for building custom role editors.
      responses:
        '200':
          description: Grouped permission catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PermissionGroup' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-hex
      description: API token minted via `/profile/tokens` or `php yii api-token/create`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }

  responses:
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Forbidden:
      description: Caller lacks the required permission
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    ValidationError:
      description: Invalid input
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    DeletedResponse:
      description: Deletion confirmed
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  deleted: { type: boolean }
    GenericResponse:
      description: Success
      content: { application/json: { schema: { type: object, properties: { data: { type: object } } } } }
    AnalyticsResult:
      description: |
        Analytics report result. When `format=json` the body wraps the report
        under `data.result` with the echoed filter set under `data.filters`.
        When `format=csv` the body is raw CSV and `data` is null.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  filters:
                    type: object
                    description: Echo of the filter parameters that were applied
                  result:
                    description: |
                      Report payload — shape depends on the endpoint. Summary
                      endpoints return an object; list endpoints return an
                      array of rows.
                    oneOf:
                      - { type: object }
                      - { type: array, items: { type: object } }
        text/csv:
          schema:
            type: string
            description: CSV export (only when `format=csv`)
    InventoryResponse:
      description: Inventory
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Inventory' }
    CredentialResponse:
      description: Credential (secrets never included)
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Credential' }
    ProjectResponse:
      description: Project
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Project' }
    JobTemplateResponse:
      description: Job template
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/JobTemplate' }
    JobResponse:
      description: Job
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Job' }
    ScheduleResponse:
      description: Schedule
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Schedule' }
    NotificationTemplateResponse:
      description: Notification template
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/NotificationTemplate' }

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
    PaginationMeta:
      type: object
      properties:
        total:    { type: integer }
        page:     { type: integer }
        per_page: { type: integer }
        pages:    { type: integer }

    Project:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string, nullable: true }
        scm_type:    { type: string, enum: [manual, git] }
        scm_url:     { type: string, nullable: true }
        scm_branch:  { type: string, nullable: true }
        created_at:  { type: integer, description: Unix timestamp }
        updated_at:  { type: integer }
    ProjectList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Project' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Inventory:
      type: object
      properties:
        id:             { type: integer }
        name:           { type: string }
        description:    { type: string, nullable: true }
        inventory_type: { type: string, enum: [static, dynamic, file] }
        project_id:     { type: integer, nullable: true }
        created_at:     { type: integer }
        updated_at:     { type: integer }
    InventoryInput:
      type: object
      required: [name, inventory_type]
      properties:
        name:           { type: string, maxLength: 128 }
        description:    { type: string, nullable: true }
        inventory_type: { type: string, enum: [static, dynamic, file] }
        content:        { type: string, description: Required when inventory_type = static }
        source_path:    { type: string, description: Required when inventory_type = file }
        project_id:     { type: integer, nullable: true }
    InventoryList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Inventory' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Credential:
      type: object
      description: Secret material is never returned by the API.
      properties:
        id:              { type: integer }
        name:            { type: string }
        description:     { type: string, nullable: true }
        credential_type: { type: string, enum: [ssh_key, username_password, vault, token] }
        username:        { type: string, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    CredentialInput:
      type: object
      required: [name, credential_type]
      properties:
        name:            { type: string, maxLength: 128 }
        description:     { type: string, nullable: true }
        credential_type: { type: string, enum: [ssh_key, username_password, vault, token] }
        username:        { type: string, nullable: true }
        secrets:
          type: object
          description: |
            Secret fields keyed by name. The accepted keys depend on
            `credential_type`:

              * `ssh_key`           → `private_key` (PEM)
              * `username_password` → `password`
              * `vault`             → `vault_password`
              * `token`             → `token`
          additionalProperties: { type: string }
    CredentialList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Credential' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    JobTemplate:
      type: object
      properties:
        id:              { type: integer }
        name:            { type: string }
        description:     { type: string, nullable: true }
        project_id:      { type: integer }
        inventory_id:    { type: integer }
        credential_id:   { type: integer, nullable: true }
        playbook:        { type: string }
        runner_group_id: { type: integer, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    JobTemplateList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/JobTemplate' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Job:
      type: object
      properties:
        id:              { type: integer }
        job_template_id: { type: integer, nullable: true }
        status:
          type: string
          enum: [pending, waiting, running, successful, failed, error, canceled]
        started_at:      { type: integer, nullable: true }
        finished_at:     { type: integer, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    JobList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Job' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Schedule:
      type: object
      properties:
        id:              { type: integer }
        name:            { type: string }
        cron_expression: { type: string }
        job_template_id: { type: integer }
        enabled:         { type: boolean }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    ScheduleList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Schedule' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    NotificationTemplate:
      type: object
      description: >
        Global notification subscription. Fires on any listed event across the
        platform — no per-template pivot. Supported events (15):
        job.launched, job.succeeded, job.failed, job.canceled,
        workflow.launched, workflow.succeeded, workflow.failed, workflow.canceled, workflow.step_failed,
        approval.requested, approval.approved, approval.rejected,
        schedule.failed_to_launch, runner.offline, runner.recovered,
        project.sync_failed, project.sync_succeeded, webhook.invalid_token.
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string, nullable: true }
        channel:     { type: string, enum: [email, slack, teams, webhook, telegram, pagerduty] }
        events:
          type: array
          items: { type: string }
          description: Event names this template subscribes to.
        config:
          type: object
          description: >
            Channel-specific config. email → {emails:[]}, slack/teams → {webhook_url},
            webhook → {url, headers?}, telegram → {bot_token, chat_id},
            pagerduty → {routing_key}.
        subject_template: { type: string, nullable: true }
        body_template:    { type: string, nullable: true }
        created_by:  { type: integer }
        created_at:  { type: integer }
        updated_at:  { type: integer }
    NotificationTemplateInput:
      type: object
      required: [name, channel, events]
      properties:
        name:             { type: string, maxLength: 128 }
        description:      { type: string, nullable: true }
        channel:          { type: string, enum: [email, slack, teams, webhook, telegram, pagerduty] }
        events:           { type: string, description: 'Comma-separated event names' }
        config:           { type: string, description: 'JSON string with channel-specific settings' }
        subject_template: { type: string, nullable: true, maxLength: 512 }
        body_template:    { type: string, nullable: true }
    NotificationTemplateList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/NotificationTemplate' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    GenericList:
      type: object
      properties:
        data: { type: array, items: { type: object } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    RoleSummary:
      type: object
      properties:
        name: { type: string, example: operator }
        description: { type: string, example: "Launch + manage" }
        is_system: { type: boolean, example: true }
        permission_count: { type: integer, example: 15 }
        user_count: { type: integer, example: 3 }

    Role:
      type: object
      properties:
        name: { type: string, example: reader-plus }
        description: { type: string, example: "Read-only access with analytics" }
        is_system: { type: boolean, example: false }
        direct_permissions:
          type: array
          items: { type: string }
          example: [project.view, job.view, analytics.view]
        effective_permissions:
          type: array
          items: { type: string }
          description: All permissions granted, recursively walking child roles (system roles only).
          example: [project.view, job.view, analytics.view]
        user_ids:
          type: array
          items: { type: integer }
          example: [12, 34]

    RoleInput:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
          pattern: '^[a-z][a-z0-9_-]{2,39}$'
          example: reader-plus
        description:
          type: string
          maxLength: 255
          example: "Read-only access with analytics"
        permissions:
          type: array
          items: { type: string }
          example: [project.view, job.view, analytics.view]

    PermissionGroup:
      type: object
      properties:
        domain: { type: string, example: project }
        label: { type: string, example: Projects }
        permissions:
          type: array
          items:
            type: object
            properties:
              name: { type: string, example: project.view }
              label: { type: string, example: "View projects" }
