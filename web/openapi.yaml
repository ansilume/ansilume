      tags: [Users]
      summary: Create a user
      description: Requires `user.create`. Password is required and must be at least 5 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
            example:
              username: operator01
              email: operator01@example.com
              password: changeme123
              role: operator
      responses:
        '201': { $ref: '#/components/responses/UserResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/users/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Users]
      summary: Get a single user
      description: |
        Requires `user.view`. Sensitive fields (password_hash, auth_key,
        totp_secret, recovery_codes) are never returned.
      responses:
        '200': { $ref: '#/components/responses/UserResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Update a user
      description: |
        Requires `user.update`. Password is optional on update — if provided
        it must be at least 5 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '200': { $ref: '#/components/responses/UserResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Users]
      summary: Delete a user
      description: |
        Requires `user.delete`. Cannot delete your own account or the last
        superadmin.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ───────────────────────────── LDAP ─────────────────────────────
  /api/v1/admin/ldap/test:
    get:
      tags: [LDAP]
      summary: Run an LDAP connection diagnostic
      description: |
        Admin-only. Performs a service-account bind against the configured
        directory and returns connection-level diagnostics. Never returns the
        bind password or any other secret.
      responses:
        '200':
          description: Diagnostic snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LdapDiagnosticResult' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServerError' }
    post:
      tags: [LDAP]
      summary: Run a diagnostic and verify a directory user
      description: |
        Admin-only. Same as `GET /admin/ldap/test`, plus an optional user
        lookup. If `password` is included the call performs a full
        authenticate (bind as user); otherwise it performs a search-only
        lookup. Useful for verifying the search filter, group mapping,
        and the resulting Ansilume role assignment for a candidate user.

        Audited via `ldap.test.performed`. The submitted password is **never**
        logged, persisted, or returned.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Directory username to look up (sAMAccountName / uid).
                password:
                  type: string
                  description: Optional. If set, performs a full authenticate.
            example:
              username: jdoe
              password: optional-only-for-bind-verification
      responses:
        '200':
          description: Diagnostic snapshot with optional user lookup
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LdapDiagnosticResult' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServerError' }

