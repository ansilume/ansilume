      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/workflow-activity:
    get:
      tags: [Analytics]
      summary: Per-workflow-template reliability
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/approval-summary:
    get:
      tags: [Analytics]
      summary: Approval request outcomes and avg decision time
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }
  /api/v1/analytics/runner-activity:
    get:
      tags: [Analytics]
      summary: Per-runner job counts, success rate, and last-seen
      parameters: *analyticsFilters
      responses:
        '200': { $ref: '#/components/responses/AnalyticsResult' }

  # ─────────────────────────── Triggers ───────────────────────────
  /trigger/{token}:
    post:
      tags: [Triggers]
      summary: Public webhook endpoint to launch a job by trigger token
      description: |
        Authentication is the token itself (path parameter). This endpoint is
        **not** under `/api/v1/` and does not use the Bearer scheme.
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Job launched
          content: { application/json: { schema: { type: object } } }
        '404':
          description: Unknown token

  # ────────────────────────────── Roles ──────────────────────────────
  /api/v1/roles:
    get:
      tags: [Roles]
      summary: List all RBAC roles (system + custom)
      responses:
        '200':
          description: List of roles with summary counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RoleSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Roles]
      summary: Create a custom role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleInput' }
            example:
              name: reader-plus
              description: Read-only access with analytics
              permissions: [project.view, job.view, analytics.view]
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/roles/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string, pattern: '^[a-z][a-z0-9_-]*$' }
    get:
      tags: [Roles]
      summary: Get a role with direct + effective permissions
      responses:
        '200':
          description: Role detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Roles]
      summary: Update a role's description and direct permissions
      description: |
        System roles (viewer/operator/admin) can have their permissions edited
        but not their name. The name field in the body is ignored for them.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleInput' }
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Roles]
      summary: Delete a custom role
      description: |
        System roles cannot be deleted — returns 422. Users holding the role
        are left with no role and must be reassigned manually.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/permissions:
    get:
      tags: [Roles]
      summary: List all known permissions grouped by domain
      description: |
        Returns the full permission catalog used by the role management UI.
        Useful for building custom role editors.
      responses:
        '200':
          description: Grouped permission catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PermissionGroup' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/profile/change-password:
    post:
      tags: [Profile]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordInput'
            example:
              current_password: "currentpass123"
              new_password: "newpass12345"
              new_password_confirm: "newpass12345"
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string, example: "Password changed." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message: { type: string }
                      fields: { type: object, additionalProperties: { type: string } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-hex
      description: API token minted via `/profile/tokens` or `php yii api-token/create`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }

  responses:
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Unauthorized:
      description: Authentication required (missing or invalid token)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Forbidden:
      description: Caller lacks the required permission
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    ValidationError:
      description: Invalid input
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    ServerError:
      description: Server-side failure (e.g. directory unreachable)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    DeletedResponse:
      description: Deletion confirmed
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  deleted: { type: boolean }
    GenericResponse:
      description: Success
      content: { application/json: { schema: { type: object, properties: { data: { type: object } } } } }
    AnalyticsResult:
      description: |
        Analytics report result. When `format=json` the body wraps the report
        under `data.result` with the echoed filter set under `data.filters`.
        When `format=csv` the body is raw CSV and `data` is null.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  filters:
                    type: object
                    description: Echo of the filter parameters that were applied
                  result:
                    description: |
                      Report payload — shape depends on the endpoint. Summary
                      endpoints return an object; list endpoints return an
                      array of rows.
                    oneOf:
                      - { type: object }
                      - { type: array, items: { type: object } }
        text/csv:
          schema:
            type: string
            description: CSV export (only when `format=csv`)
    InventoryResponse:
      description: Inventory
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Inventory' }
    CredentialResponse:
      description: Credential (secrets never included)
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Credential' }
    ProjectResponse:
      description: Project
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Project' }
    JobTemplateResponse:
      description: Job template
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/JobTemplate' }
    JobResponse:
      description: Job
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Job' }
    ScheduleResponse:
      description: Schedule
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Schedule' }
    RunnerGroupResponse:
      description: Runner group
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/RunnerGroup' }
    RunnerResponse:
      description: Runner
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Runner' }
    TeamResponse:
      description: Team with members and projects
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/TeamDetail' }
    UserResponse:
      description: User (sensitive fields excluded)
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/User' }
    WebhookResponse:
      description: Webhook
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/Webhook' }
    AuditLogResponse:
      description: Audit log entry
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/AuditLog' }
    NotificationTemplateResponse:
      description: Notification template
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { $ref: '#/components/schemas/NotificationTemplate' }

  schemas:
    ChangePasswordInput:
      type: object
      required: [current_password, new_password, new_password_confirm]
      properties:
        current_password: { type: string, description: "User's current password" }
        new_password: { type: string, minLength: 8, maxLength: 72, description: "New password (8-72 characters)" }
        new_password_confirm: { type: string, description: "Must match new_password" }
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
    PaginationMeta:
      type: object
      properties:
        total:    { type: integer }
        page:     { type: integer }
        per_page: { type: integer }
        pages:    { type: integer }

    Project:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string, nullable: true }
        scm_type:    { type: string, enum: [manual, git] }
        scm_url:     { type: string, nullable: true }
        scm_branch:  { type: string, nullable: true }
        created_at:  { type: integer, description: Unix timestamp }
        updated_at:  { type: integer }
    ProjectList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Project' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Inventory:
      type: object
      properties:
        id:             { type: integer }
        name:           { type: string }
        description:    { type: string, nullable: true }
        inventory_type: { type: string, enum: [static, dynamic, file] }
        project_id:     { type: integer, nullable: true }
        created_at:     { type: integer }
        updated_at:     { type: integer }
    InventoryInput:
      type: object
      required: [name, inventory_type]
      properties:
        name:           { type: string, maxLength: 128 }
        description:    { type: string, nullable: true }
        inventory_type: { type: string, enum: [static, dynamic, file] }
        content:        { type: string, description: Required when inventory_type = static }
        source_path:    { type: string, description: Required when inventory_type = file }
        project_id:     { type: integer, nullable: true }
    InventoryList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Inventory' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Credential:
      type: object
      description: Secret material is never returned by the API.
      properties:
        id:              { type: integer }
        name:            { type: string }
        description:     { type: string, nullable: true }
        credential_type: { type: string, enum: [ssh_key, username_password, vault, token] }
        username:        { type: string, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    CredentialInput:
      type: object
      required: [name, credential_type]
      properties:
        name:            { type: string, maxLength: 128 }
        description:     { type: string, nullable: true }
        credential_type: { type: string, enum: [ssh_key, username_password, vault, token] }
        username:        { type: string, nullable: true }
        secrets:
          type: object
          description: |
            Secret fields keyed by name. The accepted keys depend on
            `credential_type`:

              * `ssh_key`           → `private_key` (PEM)
              * `username_password` → `password`
              * `vault`             → `vault_password`
              * `token`             → `token`
          additionalProperties: { type: string }
    CredentialList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Credential' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    JobTemplate:
      type: object
      properties:
        id:              { type: integer }
        name:            { type: string }
        description:     { type: string, nullable: true }
        project_id:      { type: integer }
        inventory_id:    { type: integer }
        credential_id:   { type: integer, nullable: true }
        playbook:        { type: string }
        runner_group_id: { type: integer, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    JobTemplateList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/JobTemplate' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Job:
      type: object
      properties:
        id:              { type: integer }
        job_template_id: { type: integer, nullable: true }
        status:
          type: string
          enum: [pending, waiting, running, successful, failed, error, canceled]
        artifact_count:  { type: integer }
        started_at:      { type: integer, nullable: true }
        finished_at:     { type: integer, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    JobArtifact:
      type: object
      properties:
        id:           { type: integer }
        display_name: { type: string }
        mime_type:    { type: string }
        size_bytes:   { type: integer }
        previewable:  { type: boolean, description: "True for text/JSON/XML/YAML — fetch via /content endpoint." }
        image:        { type: boolean, description: "True for image/png|jpeg|gif|webp — fetch via /download?inline=1 to embed as <img>." }
        inline_frame: { type: boolean, description: "True for application/pdf — fetch via /download?inline=1 to embed in sandboxed <iframe>." }
        created_at:   { type: integer }
    ArtifactStorageStats:
      type: object
      properties:
        stats:
          type: object
          properties:
            total_bytes:    { type: integer, description: "Sum of all stored artifact bytes." }
            artifact_count: { type: integer }
            job_count:      { type: integer, description: "Number of distinct jobs that have at least one artifact." }
        top_jobs:
          type: array
          description: Top ten jobs by total artifact bytes, descending.
          items:
            type: object
            properties:
              job_id:         { type: integer }
              total_bytes:    { type: integer }
              artifact_count: { type: integer }
        config:
          type: object
          properties:
            retention_days:        { type: integer, description: "0 = keep forever." }
            max_file_size:         { type: integer, description: "Per-file byte cap." }
            max_artifacts_per_job: { type: integer }
            max_bytes_per_job:     { type: integer, description: "0 = unlimited." }
            max_total_bytes:       { type: integer, description: "Global cap; 0 = unlimited." }
            max_jobs_with_artifacts: { type: integer, description: "Keep only the N most recent jobs with artifacts; 0 = unlimited." }
    JobList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Job' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Schedule:
      type: object
      properties:
        id:              { type: integer }
        name:            { type: string }
        job_template_id: { type: integer }
        cron_expression: { type: string }
        timezone:        { type: string }
        enabled:         { type: boolean }
        last_run_at:     { type: integer, nullable: true }
        next_run_at:     { type: integer, nullable: true }
        created_at:      { type: integer }
        updated_at:      { type: integer }
    ScheduleList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Schedule' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    NotificationTemplate:
      type: object
      description: >
        Global notification subscription. Fires on any listed event across the
        platform — no per-template pivot. Supported events (15):
        job.launched, job.succeeded, job.failed, job.canceled,
        workflow.launched, workflow.succeeded, workflow.failed, workflow.canceled, workflow.step_failed,
        approval.requested, approval.approved, approval.rejected,
        schedule.failed_to_launch, runner.offline, runner.recovered,
        project.sync_failed, project.sync_succeeded, webhook.invalid_token.
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string, nullable: true }
        channel:     { type: string, enum: [email, slack, teams, webhook, telegram, pagerduty] }
        events:
          type: array
          items: { type: string }
          description: Event names this template subscribes to.
        config:
          type: object
          description: >
            Channel-specific config. email → {emails:[]}, slack/teams → {webhook_url},
            webhook → {url, headers?}, telegram → {bot_token, chat_id},
            pagerduty → {routing_key}.
        subject_template: { type: string, nullable: true }
        body_template:    { type: string, nullable: true }
        created_by:  { type: integer }
        created_at:  { type: integer }
        updated_at:  { type: integer }
    NotificationTemplateInput:
      type: object
      required: [name, channel, events]
      properties:
        name:             { type: string, maxLength: 128 }
        description:      { type: string, nullable: true }
        channel:          { type: string, enum: [email, slack, teams, webhook, telegram, pagerduty] }
        events:           { type: string, description: 'Comma-separated event names' }
        config:           { type: string, description: 'JSON string with channel-specific settings' }
        subject_template: { type: string, nullable: true, maxLength: 512 }
        body_template:    { type: string, nullable: true }
    NotificationTemplateList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/NotificationTemplate' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    ProjectInput:
      type: object
      required: [name, scm_type]
      properties:
        name: { type: string, maxLength: 128 }
        description: { type: string, nullable: true }
        scm_type: { type: string, enum: [manual, git] }
        scm_url: { type: string, nullable: true }
        scm_branch: { type: string, nullable: true }
        scm_credential_id: { type: integer, nullable: true }

    JobTemplateInput:
      type: object
      required: [name, project_id, inventory_id, playbook]
      properties:
        name: { type: string, maxLength: 128 }
        description: { type: string, nullable: true }
        project_id: { type: integer }
        inventory_id: { type: integer }
        credential_id: { type: integer, nullable: true }
        playbook: { type: string }
        extra_vars: { type: string, nullable: true }
        verbosity: { type: integer, minimum: 0, maximum: 5, default: 0 }
        forks: { type: integer, minimum: 1, default: 5 }
        become: { type: boolean, default: false }
        become_method: { type: string, default: sudo }
        become_user: { type: string, default: root }
        limit: { type: string, nullable: true }
        tags: { type: string, nullable: true }
        skip_tags: { type: string, nullable: true }
        timeout_minutes: { type: integer, default: 120 }
        runner_group_id: { type: integer, nullable: true }
        approval_rule_id: { type: integer, nullable: true }
        survey_fields: { type: string, nullable: true, description: JSON array of survey field definitions }

    ScheduleInput:
      type: object
      required: [name, job_template_id, cron_expression]
      properties:
        name: { type: string, maxLength: 128 }
        job_template_id: { type: integer }
        cron_expression: { type: string, description: "Standard 5-field cron expression" }
        timezone: { type: string, default: UTC }
        extra_vars: { type: string, nullable: true }
        enabled: { type: boolean, default: true }

    RunnerGroup:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        runner_count: { type: integer }
        created_at: { type: integer }
    RunnerGroupInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 128 }
        description: { type: string, nullable: true }
    RunnerGroupList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/RunnerGroup' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Runner:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        runner_group_id: { type: integer }
        runner_group_name: { type: string, nullable: true }
        is_online: { type: boolean }
        last_seen_at: { type: integer, nullable: true }
        software_version:
          type: string
          nullable: true
          description: >-
            Semver version the runner reported on its most recent heartbeat.
            `null` for runners that have not yet reported (pre-upgrade
            images). Capped at 32 characters on the server side.
          example: "2.2.16"
        created_at: { type: integer }
    RunnerMoveInput:
      type: object
      required: [target_group_id]
      properties:
        target_group_id: { type: integer, description: ID of the target runner group }
    RunnerList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Runner' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    TeamSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        member_count: { type: integer }
        project_count: { type: integer }
        created_at: { type: integer }
    TeamDetail:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        members:
          type: array
          items:
            type: object
            properties:
              user_id: { type: integer }
              username: { type: string }
        projects:
          type: array
          items:
            type: object
            properties:
              project_id: { type: integer }
              name: { type: string }
              role: { type: string }
        created_at: { type: integer }
    TeamInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 128 }
        description: { type: string, nullable: true }
    TeamList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/TeamSummary' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    User:
      type: object
      description: Sensitive fields (password_hash, auth_key, totp_secret, recovery_codes) are never returned.
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string }
        status: { type: integer, description: "10 = active, 0 = inactive" }
        is_superadmin: { type: boolean }
        totp_enabled: { type: boolean }
        role: { type: string, nullable: true }
        auth_source:
          type: string
          enum: [local, ldap]
          description: |
            Where the account authenticates. `local` uses the bcrypt password
            stored in Ansilume; `ldap` binds against the configured directory.
            Immutable once the user exists.
        ldap_dn: { type: string, nullable: true, description: Distinguished name set after the first directory bind (LDAP users only). }
        ldap_uid: { type: string, nullable: true, description: Stable directory identifier (objectGUID/entryUUID). LDAP users only. }
        last_synced_at: { type: integer, nullable: true, description: Unix timestamp of the most recent LDAP attribute sync. }
        created_at: { type: integer }
        updated_at: { type: integer }
    UserInput:
      type: object
      required: [username, email]
      properties:
        username: { type: string, maxLength: 128 }
        email: { type: string, format: email }
        password:
          type: string
          minLength: 5
          description: Required on create for local users; rejected for LDAP users. Optional on update.
        status: { type: integer }
        is_superadmin: { type: boolean }
        role: { type: string, description: RBAC role name to assign }
        auth_source:
          type: string
          enum: [local, ldap]
          default: local
          description: |
            Authentication source. Set on create; immutable thereafter — sending
            a different value on update returns 422. Defaults to `local`.
        ldap_dn:
          type: string
          nullable: true
          description: Optional DN. If omitted, the directory bind fills it on first login.
        ldap_uid:
          type: string
          nullable: true
          description: Optional stable directory identifier. Filled by directory sync if omitted.
    UserList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/User' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    LdapDiagnosticResult:
      type: object
      description: |
        LDAP connection diagnostic and optional user-lookup result.
        Never includes secrets — passwords are not echoed.
      properties:
        connection:
          type: object
          properties:
            enabled: { type: boolean }
            host: { type: string }
            encryption:
              type: string
              enum: [none, starttls, ldaps]
            base_dn: { type: string }
            bind_dn_configured: { type: boolean, description: True if a service account DN is set; the password itself is never returned. }
            service_bind: { type: boolean, description: Whether the service-account bind succeeded. }
            error: { type: string, nullable: true, description: Human-readable error if the bind failed. }
        user:
          type: object
          nullable: true
          description: Present only when the request supplies a username.
          properties:
            found: { type: boolean }
            dn: { type: string, nullable: true }
            uid: { type: string, nullable: true }
            username: { type: string, nullable: true }
            email: { type: string, nullable: true }
            display_name: { type: string, nullable: true }
            groups: { type: array, items: { type: string } }
            mapped_roles: { type: array, items: { type: string } }
            error: { type: string, nullable: true, description: Set when found=false. }

    Webhook:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        url: { type: string }
        events: { type: string, description: Comma-separated event names }
        enabled: { type: boolean }
        created_at: { type: integer }
        updated_at: { type: integer }
    WebhookInput:
      type: object
      required: [name, url]
      properties:
        name: { type: string, maxLength: 128 }
        url: { type: string, format: uri }
        secret: { type: string, nullable: true }
        events:
          description: Event names as array or comma-separated string
          oneOf:
            - { type: array, items: { type: string } }
            - { type: string }
        enabled: { type: boolean, default: true }
    WebhookList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Webhook' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    AuditLog:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer, nullable: true }
        action: { type: string }
        object_type: { type: string, nullable: true }
        object_id: { type: integer, nullable: true }
        metadata: { type: object, nullable: true, description: Parsed JSON context }
        ip_address: { type: string, nullable: true }
        created_at: { type: integer }
    AuditLogList:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/AuditLog' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    GenericList:
      type: object
      properties:
        data: { type: array, items: { type: object } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    RoleSummary:
      type: object
      properties:
        name: { type: string, example: operator }
        description: { type: string, example: "Launch + manage" }
        is_system: { type: boolean, example: true }
        permission_count: { type: integer, example: 15 }
        user_count: { type: integer, example: 3 }

    Role:
      type: object
      properties:
        name: { type: string, example: reader-plus }
        description: { type: string, example: "Read-only access with analytics" }
        is_system: { type: boolean, example: false }
        direct_permissions:
          type: array
          items: { type: string }
          example: [project.view, job.view, analytics.view]
        effective_permissions:
          type: array
          items: { type: string }
          description: All permissions granted, recursively walking child roles (system roles only).
          example: [project.view, job.view, analytics.view]
        user_ids:
          type: array
          items: { type: integer }
          example: [12, 34]

    RoleInput:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
          pattern: '^[a-z][a-z0-9_-]{2,39}$'
          example: reader-plus
        description:
          type: string
          maxLength: 255
          example: "Read-only access with analytics"
        permissions:
          type: array
          items: { type: string }
          example: [project.view, job.view, analytics.view]

    PermissionGroup:
      type: object
      properties:
        domain: { type: string, example: project }
        label: { type: string, example: Projects }
        permissions:
          type: array
          items:
            type: object
            properties:
              name: { type: string, example: project.view }
              label: { type: string, example: "View projects" }
