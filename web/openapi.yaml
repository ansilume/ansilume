openapi: 3.1.0
info:
  title: Ansilume REST API
  version: "1.9.0"
  description: |
    REST API v1 for the Ansilume automation platform.

    Every feature of Ansilume is reachable via this API — the web UI is one
    client among many. When a feature changes, this document **must** be
    updated in the same commit (see `CLAUDE.md`).

    ## Authentication

    All endpoints under `/api/v1/` require a Bearer token except where noted.
    Create a token via the browser (*Profile → API Tokens*) or from the console:

    ```bash
    docker compose exec app php yii api-token/create admin "my-token" --raw
    ```

    Pass it as:

    ```
    Authorization: Bearer <token>
    ```

    ## Errors

    Error responses have the shape `{ "error": { "message": "..." } }` and
    use conventional HTTP status codes (401, 403, 404, 422).

servers:
  - url: http://localhost:8080
    description: Local dev (via nginx)
  - url: https://ansilume.example.com
    description: Production (replace with your deployment)

security:
  - bearerAuth: []

tags:
  - name: Projects
  - name: Inventories
  - name: Credentials
  - name: Job Templates
  - name: Jobs
  - name: Schedules
  - name: Runner Groups
  - name: Runners
  - name: Teams
  - name: Users
  - name: Webhooks
  - name: Audit Logs
  - name: Notification Templates
  - name: Approval Rules
  - name: Approvals
  - name: Workflow Templates
  - name: Workflow Jobs
  - name: Analytics
  - name: Triggers
  - name: Roles
  - name: Profile
  - name: LDAP
  - name: System

# Shared query parameter list used by every analytics endpoint.
# Defined once via a YAML anchor and referenced with `*` so we don't
# repeat eight parameters ten times.
x-analytics-filters: &analyticsFilters
  - { in: query, name: date_from, required: false, schema: { type: string, format: date }, description: Inclusive start date (YYYY-MM-DD) }
  - { in: query, name: date_to, required: false, schema: { type: string, format: date }, description: Inclusive end date (YYYY-MM-DD) }
  - { in: query, name: project_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: template_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: user_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: runner_group_id, required: false, schema: { type: integer, minimum: 1 } }
  - { in: query, name: granularity, required: false, schema: { type: string, enum: [daily, weekly], default: daily } }
  - { in: query, name: format, required: false, schema: { type: string, enum: [json, csv], default: json } }

paths:
  # ─────────────────────────────── Projects ───────────────────────────────
  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectList' }
    post:
      tags: [Projects]
      summary: Create a project
      description: Requires `project.create`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
            examples:
              git:
                summary: Git-backed project
                value:
                  name: my-playbooks
                  scm_type: git
                  scm_url: "https://github.com/example/playbooks.git"
                  scm_branch: main
              manual:
                summary: Manual project
                value:
                  name: local-playbooks
                  scm_type: manual
      responses:
        '201': { $ref: '#/components/responses/ProjectResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Projects]
      summary: Get a single project
      responses:
        '200': { $ref: '#/components/responses/ProjectResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Projects]
      summary: Update a project
      description: Requires `project.update`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
      responses:
        '200': { $ref: '#/components/responses/ProjectResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Projects]
      summary: Delete a project
      description: |
        Requires `project.delete`. Refuses if job templates reference this project.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/projects/{id}/sync:
    post:
      tags: [Projects]
      summary: Trigger a git sync for a project
      description: |
        Requires `project.update`. Only works for `scm_type=git` projects.
        Queues a background sync job.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200':
          description: Sync queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      syncing: { type: boolean }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ───────────────────────────── Inventories ─────────────────────────────
  /api/v1/inventories:
    get:
      tags: [Inventories]
      summary: List inventories
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryList' }
    post:
      tags: [Inventories]
      summary: Create an inventory
      description: Requires `inventory.create` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryInput' }
            examples:
              static:
                summary: Static YAML inventory
                value:
                  name: zabbix-hq
                  inventory_type: static
                  content: "---\nall:\n  hosts:\n    zabbix-hq:\n      ansible_host: 10.1.42.108\n"
      responses:
        '201': { $ref: '#/components/responses/InventoryResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/inventories/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Inventories]
      summary: Get a single inventory
      responses:
        '200': { $ref: '#/components/responses/InventoryResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Inventories]
      summary: Update an inventory
      description: Requires `inventory.update`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryInput' }
      responses:
        '200': { $ref: '#/components/responses/InventoryResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Inventories]
      summary: Delete an inventory
      description: Requires `inventory.delete`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ───────────────────────────── Credentials ─────────────────────────────
  /api/v1/credentials:
    get:
      tags: [Credentials]
      summary: List credentials
      description: Secret material is never returned, not even redacted placeholders.
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CredentialList' }
    post:
      tags: [Credentials]
      summary: Create a credential
      description: |
        Requires `credential.create`. For `ssh_key` type, provide the raw PEM
        private key in `secrets.private_key`; public key and algorithm are
        derived server-side via `ssh-keygen -y`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CredentialInput' }
            examples:
              ssh:
                summary: SSH key credential
                value:
                  name: ssh
                  credential_type: ssh_key
                  username: root
                  secrets:
                    private_key: "-----BEGIN OPENSSH PRIVATE KEY-----\n...\n-----END OPENSSH PRIVATE KEY-----\n"
              password:
                summary: Username/password credential
                value:
                  name: db-root
                  credential_type: username_password
                  username: root
                  secrets:
                    password: hunter2
      responses:
        '201': { $ref: '#/components/responses/CredentialResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/credentials/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Credentials]
      summary: Get a single credential
      responses:
        '200': { $ref: '#/components/responses/CredentialResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Credentials]
      summary: Update a credential
      description: |
        Requires `credential.update`. If `secrets` is omitted or empty the
        existing encrypted secret blob is kept unchanged; only metadata is
        updated.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CredentialInput' }
      responses:
        '200': { $ref: '#/components/responses/CredentialResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Credentials]
      summary: Delete a credential
      description: Requires `credential.delete`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Job Templates ───────────────────────────
  /api/v1/job-templates:
    get:
      tags: [Job Templates]
      summary: List job templates
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/JobTemplateList' } } }
    post:
      tags: [Job Templates]
      summary: Create a job template
      description: Requires `job-template.create`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobTemplateInput' }
            example:
              name: Deploy web servers
              project_id: 1
              inventory_id: 1
              playbook: site.yml
              runner_group_id: 1
              verbosity: 0
              forks: 5
      responses:
        '201': { $ref: '#/components/responses/JobTemplateResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/job-templates/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Job Templates]
      summary: Get a single job template
      responses:
        '200': { $ref: '#/components/responses/JobTemplateResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Job Templates]
      summary: Update a job template
      description: Requires `job-template.update`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobTemplateInput' }
      responses:
        '200': { $ref: '#/components/responses/JobTemplateResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Job Templates]
      summary: Delete a job template
      description: Requires `job-template.delete`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────── Jobs ──────────────────────────────
  /api/v1/jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/JobList' } } }
    post:
      tags: [Jobs]
      summary: Launch a job from a template
      description: Requires `job.launch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_template_id]
              properties:
                job_template_id: { type: integer }
                extra_vars:      { type: object, additionalProperties: true }
                limit:           { type: string }
                tags:            { type: string }
      responses:
        '201': { $ref: '#/components/responses/JobResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a single job
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/JobResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/jobs/{id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a running job
      description: Requires `job.cancel`.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/JobResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/jobs/{id}/artifacts:
    get:
      tags: [Jobs]
      summary: List artifacts for a job
      description: Requires `job.view`.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200':
          description: List of artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/JobArtifact' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/jobs/{id}/artifacts/download-all:
    get:
      tags: [Jobs]
      summary: Download all artifacts as a zip archive
      description: Requires `job.view`.
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200':
          description: Zip file download
          content:
            application/zip:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/jobs/{id}/artifacts/{artifact_id}/download:
    get:
      tags: [Jobs]
      summary: Download a single artifact
      description: |
        Requires `job.view`. By default the response uses
        `Content-Disposition: attachment` so the browser saves the file.

        Pass `?inline=1` to receive `Content-Disposition: inline`. This is
        honoured for two MIME categories:
        - Image types (`image/png`, `image/jpeg`, `image/gif`, `image/webp`)
          — rendered as `<img>` in the UI.
        - PDF (`application/pdf`) — served with a hardened
          `Content-Security-Policy: ... sandbox;` header so the document can
          be embedded in a sandboxed `<iframe>` without script execution.

        Non-image / non-PDF artifacts ignore the parameter and continue to
        download.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
        - name: artifact_id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
        - name: inline
          in: query
          required: false
          description: Set to `1` to render images inline (ignored for non-image MIME types).
          schema: { type: string, enum: ['1'] }
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/jobs/{id}/artifacts/{artifact_id}/content:
    get:
      tags: [Jobs]
      summary: Get artifact content inline (text-based files only)
      description: Requires `job.view`. Returns 415 for non-previewable MIME types.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
        - name: artifact_id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Inline artifact content
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:           { type: integer }
                      display_name: { type: string }
                      mime_type:    { type: string }
                      content:      { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415':
          description: Artifact type is not previewable

  # ─────────────────────────── Schedules ───────────────────────────
  /api/v1/schedules:
    get:
      tags: [Schedules]
      summary: List schedules
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/ScheduleList' } } }
    post:
      tags: [Schedules]
      summary: Create a schedule
      description: Requires `job.launch`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScheduleInput' }
            example:
              name: Nightly deploy
              job_template_id: 1
              cron_expression: "0 2 * * *"
              timezone: UTC
              enabled: true
      responses:
        '201': { $ref: '#/components/responses/ScheduleResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/schedules/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Schedules]
      summary: Get a single schedule
      responses:
        '200': { $ref: '#/components/responses/ScheduleResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Schedules]
      summary: Update a schedule
      description: Requires `job.launch`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScheduleInput' }
      responses:
        '200': { $ref: '#/components/responses/ScheduleResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Schedules]
      summary: Delete a schedule
      description: Requires `job.launch`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/schedules/{id}/toggle:
    post:
      tags: [Schedules]
      summary: Toggle a schedule between enabled and disabled
      parameters: [{ $ref: '#/components/parameters/IdPath' }]
      responses:
        '200': { $ref: '#/components/responses/ScheduleResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────── Runner Groups ───────────────────────
  /api/v1/runner-groups:
    get:
      tags: [Runner Groups]
      summary: List runner groups
      parameters: [{ $ref: '#/components/parameters/Page' }]
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/RunnerGroupList' } } }
    post:
      tags: [Runner Groups]
      summary: Create a runner group
      description: Requires `runner-group.create`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunnerGroupInput' }
            example:
              name: production-runners
              description: Runners in the production datacenter
      responses:
        '201': { $ref: '#/components/responses/RunnerGroupResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/runner-groups/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Runner Groups]
      summary: Get a single runner group
      responses:
        '200': { $ref: '#/components/responses/RunnerGroupResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Runner Groups]
      summary: Update a runner group
      description: Requires `runner-group.update`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunnerGroupInput' }
      responses:
        '200': { $ref: '#/components/responses/RunnerGroupResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Runner Groups]
      summary: Delete a runner group
      description: |
        Requires `runner-group.delete`. Refuses if runners or job templates
        still reference this group.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ────────────────────────────── Runners ────────────────────────────
  /api/v1/runners:
    get:
      tags: [Runners]
      summary: List runners
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - name: group_id
          in: query
          schema: { type: integer }
          description: Filter by runner group ID
      responses:
        '200':
          description: Paginated list
          content: { application/json: { schema: { $ref: '#/components/schemas/RunnerList' } } }
  /api/v1/runners/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Runners]
      summary: Get a single runner
      responses:
        '200': { $ref: '#/components/responses/RunnerResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Runners]
      summary: Delete a runner
      description: Requires `runner-group.update`.
      responses:
        '200': { $ref: '#/components/responses/DeletedResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/runners/{id}/move:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Runners]
      summary: Move runner to a different group
      description: |
        Requires `runner-group.update`. Refuses if the runner has active
        or pending jobs.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunnerMoveInput' }
            example:
              target_group_id: 2
      responses:
        '200': { $ref: '#/components/responses/RunnerResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/runners/{id}/regenerate-token:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Runners]
      summary: Regenerate runner token
      description: |
