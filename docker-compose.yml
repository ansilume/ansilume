services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      - db
      - redis
    networks:
      - ansilume

  nginx:
    image: nginx:1.25-alpine
    container_name: ansilume_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ansilume

  db:
    image: mariadb:10.11
    container_name: ansilume_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-ansilume}
      MYSQL_USER: ${DB_USER:-ansilume}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - ansilume

  redis:
    image: redis:7.2-alpine
    container_name: ansilume_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ansilume

  adminer:
    image: adminer:4-standalone
    container_name: ansilume_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    volumes:
      - ./docker/adminer/index.php:/var/www/html/index.php:ro
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-ansilume}
      - DB_USER=${DB_USER:-ansilume}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      - db
    networks:
      - ansilume

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ansilume_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
    networks:
      - ansilume

  schedule-runner:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_schedule_runner
    restart: unless-stopped
    working_dir: /var/www
    command: ["/bin/sh", "-c", "while true; do php yii schedule/run; sleep 60; done"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
      - redis
    networks:
      - ansilume

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_queue_worker
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "queue/listen", "--verbose=0"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
      - redis
    networks:
      - ansilume

  runner-1:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_runner_1
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "runner/start"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - RUNNER_NAME=runner-1
      - RUNNER_BOOTSTRAP_SECRET=${RUNNER_BOOTSTRAP_SECRET}
      - API_URL=http://nginx
    depends_on:
      - nginx
    networks:
      - ansilume

  runner-2:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_runner_2
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "runner/start"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - RUNNER_NAME=runner-2
      - RUNNER_BOOTSTRAP_SECRET=${RUNNER_BOOTSTRAP_SECRET}
      - API_URL=http://nginx
    depends_on:
      - nginx
    networks:
      - ansilume

networks:
  ansilume:
    driver: bridge

volumes:
  db_data:
