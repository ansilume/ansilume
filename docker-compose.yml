version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ansilume_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      - db
      - redis
    networks:
      - ansilume

  nginx:
    image: nginx:1.25-alpine
    container_name: ansilume_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ansilume

  db:
    image: mariadb:10.11
    container_name: ansilume_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-ansilume}
      MYSQL_USER: ${DB_USER:-ansilume}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - ansilume

  redis:
    image: redis:7.2-alpine
    container_name: ansilume_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ansilume

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ansilume_worker
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "worker/start"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      - db
      - redis
    networks:
      - ansilume

networks:
  ansilume:
    driver: bridge

volumes:
  db_data:
