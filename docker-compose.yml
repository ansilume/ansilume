services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "/var/www/yii", "health/check"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ansilume

  nginx:
    image: nginx:1.25-alpine
    container_name: ansilume_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health 2>/dev/null | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - ansilume

  db:
    image: mariadb:10.11
    container_name: ansilume_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-ansilume}
      MYSQL_USER: ${DB_USER:-ansilume}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USER:-ansilume}", "-p${DB_PASSWORD:-secret}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ansilume

  redis:
    image: redis:7.2-alpine
    container_name: ansilume_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ansilume

  adminer:
    image: adminer:4-standalone
    container_name: ansilume_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    volumes:
      - ./docker/adminer/index.php:/var/www/html/index.php:ro
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-ansilume}
      - DB_USER=${DB_USER:-ansilume}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ansilume

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ansilume_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
    networks:
      - ansilume

  schedule-runner:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_schedule_runner
    restart: unless-stopped
    working_dir: /var/www
    command: ["/bin/sh", "-c",
      "while true; do php yii schedule/run && touch /tmp/schedule-alive; sleep 60; done"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c",
        "test -f /tmp/schedule-alive && test $(( $(date +%s) - $(stat -c %Y /tmp/schedule-alive) )) -lt 150"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 90s
    networks:
      - ansilume

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_queue_worker
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "worker/start"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "/var/www/yii", "health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ansilume

  runner-1:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_runner_1
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "runner/start"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - RUNNER_NAME=runner-1
      - RUNNER_BOOTSTRAP_SECRET=${RUNNER_BOOTSTRAP_SECRET}
      - API_URL=http://nginx
    depends_on:
      nginx:
        condition: service_started
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /var/www/runtime/runner-runner-1.token"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - ansilume

  runner-2:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: ansilume_runner_2
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "yii", "runner/start"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - RUNNER_NAME=runner-2
      - RUNNER_BOOTSTRAP_SECRET=${RUNNER_BOOTSTRAP_SECRET}
      - API_URL=http://nginx
    depends_on:
      nginx:
        condition: service_started
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /var/www/runtime/runner-runner-2.token"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - ansilume

networks:
  ansilume:
    driver: bridge

volumes:
  db_data:
