name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: lint
            name: Lint & Checks
            timeout: 15
          - suite: style
            name: Code Style
            timeout: 15
          - suite: phpstan
            name: PHPStan
            timeout: 15
          - suite: phpunit
            name: PHPUnit
            timeout: 20
          - suite: e2e
            name: Playwright E2E
            timeout: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i \
            -e "s|^COOKIE_VALIDATION_KEY=.*|COOKIE_VALIDATION_KEY=$(openssl rand -hex 32)|" \
            -e "s|^APP_SECRET_KEY=.*|APP_SECRET_KEY=$(openssl rand -hex 32)|" \
            -e "s|^RUNNER_BOOTSTRAP_SECRET=.*|RUNNER_BOOTSTRAP_SECRET=$(openssl rand -hex 24)|" \
            .env

      - name: Build and start services
        run: |
          docker compose build
          docker compose up -d db redis
          docker compose up -d app queue-worker
          # Mailhog is the SMTP target in e2e (notification-templates/send-test.spec.ts).
          # It has no incoming depends_on link, so it must be started explicitly.
          if [ "${{ matrix.suite }}" = "e2e" ]; then
            docker compose up -d mailhog
          fi
        env:
          UID: "1000"
          GID: "1000"

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app container..."
          for i in $(seq 1 180); do
            STATUS=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' ansilume_app 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "healthy" ]; then
              echo "App healthy after $((i * 5))s"
              break
            fi
            STATE=$(docker inspect --format '{{.State.Status}}' ansilume_app 2>/dev/null || echo "unknown")
            if [ "$STATE" != "running" ]; then
              echo "App not running (state: $STATE)"
              docker compose logs app
              exit 1
            fi
            [ "$((i % 12))" = "0" ] && echo "Waiting... ($((i * 5))s, status: $STATUS)"
            sleep 5
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "Timeout waiting for app"
            docker compose logs app
            exit 1
          fi

      - name: Set up test database
        if: matrix.suite == 'phpunit'
        run: |
          DB_ROOT_PASSWORD=$(grep '^DB_ROOT_PASSWORD=' .env | cut -d= -f2)
          DB_USER=$(grep '^DB_USER=' .env | cut -d= -f2)
          DB_TEST_NAME=$(grep '^DB_TEST_NAME=' .env | cut -d= -f2)
          docker compose exec -T db mariadb -uroot -p"${DB_ROOT_PASSWORD}" -e \
            "CREATE DATABASE IF NOT EXISTS \`${DB_TEST_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; \
             GRANT ALL PRIVILEGES ON \`${DB_TEST_NAME}\`.* TO '${DB_USER}'@'%'; \
             FLUSH PRIVILEGES;"
          docker compose exec -T app bash -c "DB_NAME=${DB_TEST_NAME} php yii migrate --interactive=0"

      - name: Build Playwright container
        if: matrix.suite == 'e2e'
        run: docker compose --profile e2e build playwright

      - name: Run ${{ matrix.name }}
        run: bin/tests-${{ matrix.suite }}.sh

      - name: Upload Playwright report
        if: always() && matrix.suite == 'e2e'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs app
          docker compose logs db
