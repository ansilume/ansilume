name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i \
            -e "s|^COOKIE_VALIDATION_KEY=.*|COOKIE_VALIDATION_KEY=$(openssl rand -hex 32)|" \
            -e "s|^APP_SECRET_KEY=.*|APP_SECRET_KEY=$(openssl rand -hex 32)|" \
            -e "s|^RUNNER_BOOTSTRAP_SECRET=.*|RUNNER_BOOTSTRAP_SECRET=$(openssl rand -hex 24)|" \
            .env

      - name: Start services
        run: docker compose up -d --build
        env:
          UID: "1000"
          GID: "1000"

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose ps app --format json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "healthy" ]; then
              echo "App is healthy"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done
          docker compose ps

      - name: Set up test database
        run: |
          DB_ROOT_PASSWORD=$(grep '^DB_ROOT_PASSWORD=' .env | cut -d= -f2)
          DB_USER=$(grep '^DB_USER=' .env | cut -d= -f2)
          DB_TEST_NAME=$(grep '^DB_TEST_NAME=' .env | cut -d= -f2)
          docker compose exec -T db mariadb -uroot -p"${DB_ROOT_PASSWORD}" -e \
            "CREATE DATABASE IF NOT EXISTS \`${DB_TEST_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; \
             GRANT ALL PRIVILEGES ON \`${DB_TEST_NAME}\`.* TO '${DB_USER}'@'%'; \
             FLUSH PRIVILEGES;"
          docker compose exec -T app bash -c "DB_NAME=${DB_TEST_NAME} php yii migrate --interactive=0"

      - name: Run test suite
        run: docker compose exec -T app bash -c './tests.sh --skip-e2e'

      - name: Build Playwright container
        run: docker compose --profile e2e build playwright

      - name: Seed E2E data
        run: docker compose exec -T app php yii e2e/seed

      - name: Run Playwright E2E tests
        run: docker compose --profile e2e run --rm --no-deps playwright

      - name: Teardown E2E data
        if: always()
        run: docker compose exec -T app php yii e2e/teardown || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs app
          docker compose logs db
          docker compose logs queue-worker
