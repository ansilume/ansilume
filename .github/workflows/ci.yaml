name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i \
            -e "s|^COOKIE_VALIDATION_KEY=.*|COOKIE_VALIDATION_KEY=$(openssl rand -hex 32)|" \
            -e "s|^APP_SECRET_KEY=.*|APP_SECRET_KEY=$(openssl rand -hex 32)|" \
            -e "s|^RUNNER_BOOTSTRAP_SECRET=.*|RUNNER_BOOTSTRAP_SECRET=$(openssl rand -hex 24)|" \
            .env

      - name: Build and start core services
        run: |
          # Build all images first, then start in stages to avoid
          # docker compose blocking on depends_on health checks.
          docker compose build
          docker compose up -d db redis mailhog swagger adminer
          docker compose up -d app queue-worker schedule-runner
        env:
          UID: "1000"
          GID: "1000"

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app container to become healthy (up to 15 minutes)..."
          for i in $(seq 1 180); do
            STATUS=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' ansilume_app 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "healthy" ]; then
              echo "App is healthy after $((i * 5))s"
              break
            fi
            STATE=$(docker inspect --format '{{.State.Status}}' ansilume_app 2>/dev/null || echo "unknown")
            if [ "$STATE" != "running" ]; then
              echo "App container is not running (state: $STATE)"
              docker compose logs app
              exit 1
            fi
            if [ "$((i % 12))" = "0" ]; then
              echo "Still waiting... ($((i * 5))s elapsed, status: $STATUS)"
            fi
            sleep 5
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "Timed out waiting for app to become healthy"
            docker compose logs app
            exit 1
          fi

      - name: Start remaining services
        run: docker compose up -d

      - name: Set up test database
        run: |
          DB_ROOT_PASSWORD=$(grep '^DB_ROOT_PASSWORD=' .env | cut -d= -f2)
          DB_USER=$(grep '^DB_USER=' .env | cut -d= -f2)
          DB_TEST_NAME=$(grep '^DB_TEST_NAME=' .env | cut -d= -f2)
          docker compose exec -T db mariadb -uroot -p"${DB_ROOT_PASSWORD}" -e \
            "CREATE DATABASE IF NOT EXISTS \`${DB_TEST_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; \
             GRANT ALL PRIVILEGES ON \`${DB_TEST_NAME}\`.* TO '${DB_USER}'@'%'; \
             FLUSH PRIVILEGES;"
          docker compose exec -T app bash -c "DB_NAME=${DB_TEST_NAME} php yii migrate --interactive=0"

      - name: Run test suite
        run: docker compose exec -T app bash -c './tests.sh --skip-e2e'

      - name: Build Playwright container
        run: docker compose --profile e2e build playwright

      - name: Seed E2E data
        run: docker compose exec -T app php yii e2e/seed

      - name: Run Playwright E2E tests
        run: docker compose --profile e2e run --rm --no-deps playwright

      - name: Teardown E2E data
        if: always()
        run: docker compose exec -T app php yii e2e/teardown || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs app
          docker compose logs db
          docker compose logs queue-worker
