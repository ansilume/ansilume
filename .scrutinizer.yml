build:
  environment:
    php:
      version: "8.2"
      pecl_extensions:
        - pcov
  services:
    mysql: 5.7
    redis: 7
  dependencies:
    override:
      - composer self-update --2
      - composer install --no-interaction --prefer-dist
  tests:
    before:
      - printf 'DB_HOST=127.0.0.1\nDB_USER=ansilume\nDB_PASSWORD=secret\nDB_NAME=ansilume\nDB_TEST_NAME=ansilume_test\nREDIS_HOST=127.0.0.1\nAPP_SECRET_KEY=scrutinizer-test-key-that-is-32-bytes!\n' > .env
      - mysql -u root -h 127.0.0.1 -e "CREATE DATABASE ansilume; CREATE DATABASE ansilume_test; CREATE USER 'ansilume'@'%' IDENTIFIED BY 'secret'; GRANT ALL ON ansilume.* TO 'ansilume'@'%'; GRANT ALL ON ansilume_test.* TO 'ansilume'@'%'; FLUSH PRIVILEGES;"
      - php yii migrate --interactive=0
      - sed -i 's/DB_NAME=ansilume/DB_NAME=ansilume_test/' .env && php yii migrate --interactive=0 && sed -i 's/DB_NAME=ansilume_test/DB_NAME=ansilume/' .env
    override:
      - php-scrutinizer-run
      -
        command: vendor/bin/phpunit --testsuite=Unit --colors=never --coverage-clover clover.xml
        coverage:
          file: clover.xml
          format: php-clover

checks:
  php:
    code_rating: true
    duplication: true
    # PSR-12 is authoritative for code style — suppress conflicting fixes:
    # - PSR-12 requires space after 'function' in closures: function ($x)
    # - PSR-12 requires spaces around bitwise OR: CONST_A | CONST_B
    spacing_of_function_arguments: false
    spacing_around_non_conditional_operators: false

tools:
  php_code_sniffer:
    config:
      standard: PSR12
  php_mess_detector: true
  php_cpd: true

filter:
  excluded_paths:
    - vendor/*
    - tests/*
    - runtime/*
    - web/assets/*
    - web/js/cronstrue.min.js
    # Vendored third-party JS (CodeMirror, js-yaml, …) — not ours to review,
    # and their size/complexity skews the metrics for our own code.
    - web/js/vendor/*
    - docker/*
    - migrations/*
