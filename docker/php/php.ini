upload_max_filesize = 40M
post_max_size = 40M
max_execution_time = 120
memory_limit = 256M
date.timezone = UTC
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
; Suppress PHP version disclosure in the Server header and X-Powered-By.
expose_php = Off
