server {
    listen 80;
    server_name _;
    root /var/www/web;
    index index.php;

    charset utf-8;
    client_max_body_size 40M;

    # Hide nginx version in Server header and error pages
    server_tokens off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Security headers are set by PHP (see config/web.php response.beforeSend).
    # Adding them again here would duplicate each header because nginx's
    # `add_header` appends rather than replaces. Non-PHP responses — the
    # openapi.yaml static file — set their own headers in the location block.

    # Publicly serve the OpenAPI spec with CORS enabled so the Swagger UI
    # container (different origin) can fetch it directly from the browser.
    # nginx does not inherit server-level add_header into locations that
    # set their own headers, so the security headers are repeated here.
    location = /openapi.yaml {
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff"    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "no-cache" always;
        default_type application/yaml;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(ht|git) {
        deny all;
    }
}
